<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Bloqueado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="blocked-root"></div>
  <script type="module">
    import React from 'https://esm.sh/react@19.2.0';
    import ReactDOM from 'https://esm.sh/react-dom@19.2.0/client';
    
    // Iconos SVG
    const ShieldIcon = () => React.createElement('svg', {
      width: '64',
      height: '64',
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: 'currentColor',
      strokeWidth: '1.5',
      strokeLinecap: 'round',
      strokeLinejoin: 'round'
    },
      React.createElement('path', { d: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z' })
    );

    const LockIcon = () => React.createElement('svg', {
      width: '20',
      height: '20',
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: 'currentColor',
      strokeWidth: '2',
      strokeLinecap: 'round',
      strokeLinejoin: 'round'
    },
      React.createElement('rect', { x: '3', y: '11', width: '18', height: '11', rx: '2', ry: '2' }),
      React.createElement('path', { d: 'M7 11V7a5 5 0 0 1 10 0v4' })
    );

    const ArrowLeftIcon = () => React.createElement('svg', {
      width: '18',
      height: '18',
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: 'currentColor',
      strokeWidth: '2',
      strokeLinecap: 'round',
      strokeLinejoin: 'round'
    },
      React.createElement('line', { x1: '19', y1: '12', x2: '5', y2: '12' }),
      React.createElement('polyline', { points: '12 19 5 12 12 5' })
    );

    const HomeIcon = () => React.createElement('svg', {
      width: '18',
      height: '18',
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: 'currentColor',
      strokeWidth: '2',
      strokeLinecap: 'round',
      strokeLinejoin: 'round'
    },
      React.createElement('path', { d: 'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z' }),
      React.createElement('polyline', { points: '9 22 9 12 15 12 15 22' })
    );

    const InfoIcon = () => React.createElement('svg', {
      width: '16',
      height: '16',
      viewBox: '0 0 24 24',
      fill: 'none',
      stroke: 'currentColor',
      strokeWidth: '2',
      strokeLinecap: 'round',
      strokeLinejoin: 'round'
    },
      React.createElement('circle', { cx: '12', cy: '12', r: '10' }),
      React.createElement('line', { x1: '12', y1: '16', x2: '12', y2: '12' }),
      React.createElement('line', { x1: '12', y1: '8', x2: '12.01', y2: '8' })
    );

    const BlockedPage = () => {
      const [isDarkMode, setIsDarkMode] = React.useState(false);

      React.useEffect(() => {
        const checkDarkMode = () => {
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          setIsDarkMode(prefersDark);
          if (prefersDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        };

        checkDarkMode();
        
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        mediaQuery.addEventListener('change', checkDarkMode);

        return () => mediaQuery.removeEventListener('change', checkDarkMode);
      }, []);

      return React.createElement('div', {
        className: 'container',
      },
        React.createElement('div', { className: 'content' },
          // Icono principal
          React.createElement('div', { className: 'icon-wrapper' },
            React.createElement('div', { className: 'icon-circle' },
              React.createElement(ShieldIcon)
            ),
            React.createElement('div', { className: 'icon-badge' },
              React.createElement(LockIcon)
            )
          ),
          
          // Título y descripción
          React.createElement('div', { className: 'text-content' },
            React.createElement('h1', { className: 'title' }, 'Acceso Bloqueado'),
            React.createElement('p', { className: 'description' }, 
              'Lo sentimos, no tienes permiso para acceder a esta página.'
            )
          ),
          
          // Información adicional
          React.createElement('div', { className: 'info-box' },
            React.createElement('div', { className: 'info-header' },
              React.createElement(InfoIcon),
              React.createElement('span', null, 'Información del Error')
            ),
            React.createElement('div', { className: 'info-grid' },
              React.createElement('div', { className: 'info-item' },
                React.createElement('span', { className: 'info-label' }, 'Código'),
                React.createElement('span', { className: 'info-value' }, '403')
              ),
              React.createElement('div', { className: 'info-item' },
                React.createElement('span', { className: 'info-label' }, 'Estado'),
                React.createElement('span', { className: 'info-value' }, 'Forbidden')
              )
            )
          ),
          
          // Botones
          React.createElement('div', { className: 'actions' },
            React.createElement('button', {
              onClick: () => window.history.back(),
              className: 'btn btn-primary'
            }, 
              React.createElement(ArrowLeftIcon),
              React.createElement('span', null, 'Regresar')
            ),
            React.createElement('a', {
              href: '/',
              className: 'btn btn-secondary'
            }, 
              React.createElement(HomeIcon),
              React.createElement('span', null, 'Inicio')
            )
          ),
          
          // Nota
          React.createElement('p', { className: 'footer-text' }, 
            'Si crees que esto es un error, contacta al desarrollador.'
          )
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('blocked-root'));
    root.render(React.createElement(BlockedPage));
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: #fafafa;
    }
    
    .dark .container {
      background-color: #000000;
    }
    
    .content {
      max-width: 420px;
      width: 100%;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Icono */
    .icon-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
    }
    
    .icon-circle {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 10px 40px rgba(229, 62, 62, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 10px 40px rgba(229, 62, 62, 0.3);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 15px 50px rgba(229, 62, 62, 0.4);
      }
    }
    
    .icon-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e53e3e;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    
    .dark .icon-badge {
      background: #262626;
      color: #f56565;
    }
    
    /* Texto */
    .text-content {
      margin-bottom: 24px;
    }
    
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #262626;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    
    .dark .title {
      color: #fafafa;
    }
    
    .description {
      font-size: 14px;
      color: #8e8e8e;
      line-height: 1.5;
      font-weight: 400;
    }
    
    .dark .description {
      color: #a8a8a8;
    }
    
    /* Info box */
    .info-box {
      background: white;
      border: 1px solid #dbdbdb;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    
    .dark .info-box {
      background: #262626;
      border-color: #363636;
    }
    
    .info-header {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #262626;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #efefef;
    }
    
    .dark .info-header {
      color: #fafafa;
      border-bottom-color: #363636;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .info-label {
      font-size: 12px;
      color: #8e8e8e;
      font-weight: 500;
    }
    
    .dark .info-label {
      color: #a8a8a8;
    }
    
    .info-value {
      font-size: 14px;
      color: #262626;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }
    
    .dark .info-value {
      color: #fafafa;
    }
    
    /* Botones */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    
    .btn-primary {
      background-color: #0095f6;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #1877f2;
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    .btn-secondary {
      background-color: transparent;
      color: #262626;
      border: 1px solid #dbdbdb;
    }
    
    .dark .btn-secondary {
      color: #fafafa;
      border-color: #363636;
    }
    
    .btn-secondary:hover {
      background-color: #fafafa;
    }
    
    .dark .btn-secondary:hover {
      background-color: #1a1a1a;
    }
    
    .btn-secondary:active {
      transform: scale(0.98);
    }
    
    /* Footer */
    .footer-text {
      font-size: 12px;
      color: #8e8e8e;
      line-height: 1.5;
    }
    
    .dark .footer-text {
      color: #a8a8a8;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .actions {
        grid-template-columns: 1fr;
      }
      
      .title {
        font-size: 20px;
      }
      
      .icon-wrapper {
        width: 80px;
        height: 80px;
        margin-bottom: 24px;
      }
      
      .icon-circle {
        width: 80px;
        height: 80px;
      }
      
      .icon-circle svg {
        width: 52px;
        height: 52px;
      }
      
      .icon-badge {
        width: 36px;
        height: 36px;
      }
      
      .icon-badge svg {
        width: 18px;
        height: 18px;
      }
    }
  </style>
</head>
</html>
